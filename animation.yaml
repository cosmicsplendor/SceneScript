    Generators:
      - IDPrefix: blinder
        Count: 9
        Variables:
          x: 27.85
          y: 600 + 52 - i * 52
          z: 3530.3
          destY: vars.y - 52
          divisor: 25

          # --- Quad In Logic (Acceleration) ---
          # Based on Count 9 (Max 9).
          # Formula: (2 * 9 * i) - (i * i)
          invisibleTill: 0.45 + 0.1 * i / 9

          # Duration is the difference between this start and next start
          # Formula: (2 * 9) - (2 * i) - 1
          duration: 0.1/9

        Initial: { frame: blinder, scale: 7, invisibleTill: vars.invisibleTill }
        Keyframes:
          - Time: vars.invisibleTill
            Position: { x: vars.x, y: vars.y, z: vars.z }
          - Time: vars.invisibleTill + vars.duration
            Position: { x: vars.x, y: vars.destY, z: vars.z }
