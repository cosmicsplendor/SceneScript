    # Generators:
    #   - IDPrefix: recursive_dolls_
    #     # Sum of counts (2+4+8...+2048) = 4094
    #     Count: 510 
    #     Variables:
    #       # --- 1. Identify where we are in the fractal ---
    #       # Determines which "Doll" batch (0 to 10) this index belongs to
    #       layer: Math.floor(Math.log2(i + 2)) - 1
          
    #       # The index relative to the start of this batch (0 to Count-1)
    #       local_i: i - (Math.pow(2, vars.layer + 1) - 2)

    #       # --- 2. Grid & Positioning Math ---
    #       # Columns double every 2 layers (1, 2, 2, 4, 4, 8...)
    #       cols: Math.pow(2, Math.ceil(vars.layer / 2))
          
    #       # Standard grid calculation using the dynamic 'cols'
    #       start_x: -1 + (vars.local_i % vars.cols) * 0.25
    #       start_y: 100 + Math.floor(vars.local_i / vars.cols) * 35

    #       # --- 3. Animation Logic ---
    #       # Even layers (0, 2, 4) move horizontally. Odd layers (1, 3) move vertically.
    #       is_even: (vars.layer % 2) === 0
          
    #       # Destination Logic
    #       # If even: Shift X by 2^(ceil(layer/2)+1). If odd: Shift Y by cols * 280.
    #       dest_x: "vars.is_even ? vars.start_x + Math.pow(2, Math.ceil(vars.layer/2) + 1) / 8: vars.start_x"
    #       dest_y: "vars.is_even ? vars.start_y : vars.start_y + (vars.cols * 35)"

    #       # --- 4. Timing ---
    #       # Stagger start time based on layer index
    #       t_0: 0.199 + (vars.layer * 0.075)
    #       t_1: vars.t_0 + 0.001
    #       t_2: vars.t_0 + 0.076

    #     Initial: 
    #       frame: dollar
    #       scale: 0.5
        
    #     Keyframes:
    #       # Your engine parses strings in Keyframes using deepResolve/evaluate,
    #       # so dynamic Time and Positions work automatically.
    #       - Time: vars.t_0
    #         Position: { x: vars.start_x, y: vars.start_y, z: 2080 }
    #         Alpha: 0
    #       - Time: vars.t_1
    #         Alpha: 1
    #         Position: { x: vars.start_x, y: vars.start_y, z: 2080 }
    #         Easing:
    #           Position: cubicInOut
    #       - Time: vars.t_2
    #         Alpha: 1
    #         Position: { x: vars.dest_x, y: vars.dest_y, z: 2080 }
    #         Easing: { Alpha: step }
    #       - Time: 1.3
    #         Alpha: 0
    #   - IDPrefix: doll_1
    #     Count: 1536 
    #     Variables: { x: -1 + ( i % 16) * 0.25, y: 100 + 35 * Math.floor(i / 16), toffset: i/4000, finalX: "vars.x < 2 && vars.y < 1500? 0.1 + vars.x /3: vars.x", finalY: "vars.x < 2 && vars.y < 1500? vars.y - 1000: vars.y + 35 * 32", finalZ: "vars.x < 2 && vars.y < 1500? 1950: 2080", finalTime: "vars.x < 2 && vars.y < 1500? 1.35: 1.3", finalRot: "vars.x < 2 && vars.y < 1500? 1.55: 0" }
    #     Initial: { frame: dollar, scale: 0.5, Alpha: 0 }
    #     Keyframes:
    #       - Time: 0.84 + vars.toffset
    #         Alpha: 0
    #         Position: { x: vars.x, y: vars.y + 35 * 32, z: 2080 }
    #       - Time: 0.85 + vars.toffset 
    #         Alpha: 1
    #         Position: { x: vars.x, y: vars.y + 35 * 32, z: 2080 }
    #       - Time: vars.finalTime
    #         Alpha: 1
    #         Position: { x: vars.x, y: vars.y + 35 * 32, z: 2080 }
    #         Rotation: 0
    #         Easing:
    #           Position: expoOut
    #       - Time: vars.finalTime + 0.05
    #         Alpha: 0
    #         Rotation: vars.finalRot
    #         Position: { x: vars.finalX, y: vars.finalY, z: vars.finalZ }
