Modifiers:
  IphoneReveal:
    Type: Sequence
    TargetProperty: position.y
    Playback: Once
    Interpolation: step
    Values: [-40, -20, 0, -20, -40, -48, -40, -20, 0] 
    CycleDuration: 0.8 # The duration of a full walk cycle (matches the 6 frames at 0.1s)
    Amplitude: 3 # Master scaler for the bob height
  SubtleWalk_Bob:
    Type: Sequence
    TargetProperty: position.y
    Playback: Loop
    Interpolation: sineInOut
    Values: [0, 15, 25, 15, 0, -10, -15, -10] 
    CycleDuration: 0.3 # The duration of a full walk cycle (matches the 6 frames at 0.1s)
    Amplitude: 0.5 # Master scaler for the bob height
  Wind_Sway:
    Type: Sequence
    TargetProperty: rotation
    Playback: Loop
    Interpolation: sineInOut
    Values:  [ 0.0, 0.05, 0.12, 0.18, 0.22, 0.25, 0.23, 0.18, 0.12, 0.05, 0.0, -0.05, -0.10, -0.16, -0.20, -0.22, -0.20, -0.16, -0.10, -0.05, 0.0 ]
    CycleDuration: 2
    Amplitude: 1
  Gentle_Breathe:
    Type: Oscillator
    TargetProperty: scale
    Waveform: Sine
    Amplitude: 0.1 # Scale will vary by +/- 2% from its base value
    Frequency: 0.5 # One breath every 2 seconds
  CrowWalk_Bob:
    Type: Sequence
    TargetProperty: position.y
    Playback: Loop
    Interpolation: sineInOut
    Values: [0, 15, 25, 15, 0, -10, -15, -10]
    CycleDuration: 2 # The duration of a full walk cycle (matches the 6 frames at 0.1s)
    Amplitude: 0.25 # Master scaler for the bob height
  PregnantY:
    Type: Sequence
    TargetProperty: position.y
    Playback: Loop
    Interpolation: sineInOut
    Values: [0, 15, 25, 15, 0, -10, -15, -10]
    CycleDuration: 0.5 # The duration of a full walk cycle (matches the 6 frames at 0.1s)
    Amplitude: 0.1 # Master scaler for the bob height
  PregnantRot:
      Type: Sequence
      TargetProperty: rotation
      Playback: Loop
      Interpolation: sineInOut
      Values:  [0.0, 0.05, 0.12, 0.18, 0.22, 0.25, 0.23, 0.18, 0.12, 0.05, 0.0, -0.05, -0.10, -0.16, -0.20, -0.22, -0.20, -0.16, -0.10, -0.05, 0.0]
      CycleDuration: 0.8
      Amplitude: 0.05
  PregnantX:
    Type: Sequence
    TargetProperty: position.x
    Playback: Loop
    Interpolation: sineInOut
    Values: [0, 15, 25, 15, 0, -10, -15, -10]
    CycleDuration: 0.25 # The duration of a full walk cycle (matches the 6 frames at 0.1s)
    Amplitude: 0.0005 # Master scaler for the bob height
  Walk_Bob:
    Type: Sequence
    TargetProperty: position.y
    Playback: Loop
    Interpolation: sineInOut
    Values: [0, 15, 25, 15, 0, -10, -15, -10]
    CycleDuration: 0.15 # The duration of a full walk cycle (matches the 6 frames at 0.1s)
    Amplitude: 1.0 # Master scaler for the bob height
  RunCycle_Bob:
      Type: Sequence
      TargetProperty: position.y
      Playback: Loop
      Interpolation: sin # Changed from sineIn for smoother looping
      # Values: [Highest, Mid, Lowest, Mid, Highest]
      Values: [5, 0, -5, 0, 5]
      CycleDuration: 0.24 # CRITICAL FIX: Must match Rotation's 0.3
      Amplitude: 4.0 # Changed to 1.0. With values [5, 0, -5, 0, 5], Amplitude: 5.0 would result in a 25 unit bob!
  RunCycle_Rotation:
      Type: Sequence
      TargetProperty: rotation
      Playback: Loop
      Interpolation: sin # Changed from sineIn for smoother looping
      # Values: [Forward Lean, Zero, Backward Lean, Zero, Forward Lean]
      Values:  [0.1, 0.0, -0.2, 0.0, 0.1]
      CycleDuration: 0.5 # CRITICAL: Matched to Bob's duration
      Amplitude: 1.0
  Walk_Rotation:
      Type: Sequence
      TargetProperty: rotation
      Playback: Loop
      Interpolation: sin
      Values:  [0.1, 0.0, -0.2, 0.0, 0.1]
      CycleDuration: 1
      Amplitude: 0.8
XOffset: 0
ZOffset: 1400
ORIGIN_Y: 0.55
StartSequence: SETUP
HidePrevious: true
FOV: 120
Sequence:
  - EventID: SETUP
    Duration: 200
    Normalize: true
    Camera:
      Keyframes:
        0:
          x: -0.75
          y: 0
          z: 2220
          fov: 140
          Easing:
            Position: sineInOut
        0.15:
          x: -0.9
          y: 0
          z: 2210
          fov: 140
        0.275:
          x: -0.9
          y: 0
          z: 2210
          fov: 140
          Easing:
            Position: quadInOut
        0.325:
          x: -0.5 
          y: 0
          z: 2080
          fov: 140
        0.55:
          x: -0.5 
          y: 0
          z: 2080
          fov: 140
          Easing:
            Position: cubicInOut
        0.6:
          x: 2.5 
          y: 0
          z: 1800
          fov: 145
        0.75:
          x: 2.5 
          y: 0
          z: 1800
          fov: 145
          Easing:
            Position: expoOut
        1:
          x: 2.5 
          y: 4000
          z: 1800
          fov: 145
        1.075:
          x: 2.6 
          y: 6000
          z: 2220
          fov: 145
        1.2:
          x: 2.6 
          y: 8000
          z: 2250
          fov: 145
        2:
          x: 2.6 
          y: 8000
          z: 2250
          fov: 145
       
        
    Generators:
      - IDPrefix: recursive_dolls_
        # Sum of counts (2+4+8...+2048) = 4094
        Count: 510 
        Variables:
          # --- 1. Identify where we are in the fractal ---
          # Determines which "Doll" batch (0 to 10) this index belongs to
          layer: Math.floor(Math.log2(i + 2)) - 1
          
          # The index relative to the start of this batch (0 to Count-1)
          local_i: i - (Math.pow(2, vars.layer + 1) - 2)

          # --- 2. Grid & Positioning Math ---
          # Columns double every 2 layers (1, 2, 2, 4, 4, 8...)
          cols: Math.pow(2, Math.ceil(vars.layer / 2))
          
          # Standard grid calculation using the dynamic 'cols'
          start_x: -1 + (vars.local_i % vars.cols) * 0.5
          start_y: 100 + Math.floor(vars.local_i / vars.cols) * 70

          # --- 3. Animation Logic ---
          # Even layers (0, 2, 4) move horizontally. Odd layers (1, 3) move vertically.
          is_even: (vars.layer % 2) === 0
          
          # Destination Logic
          # If even: Shift X by 2^(ceil(layer/2)+1). If odd: Shift Y by cols * 280.
          dest_x: "vars.is_even ? vars.start_x + Math.pow(2, Math.ceil(vars.layer/2) + 1) / 4: vars.start_x"
          dest_y: "vars.is_even ? vars.start_y : vars.start_y + (vars.cols * 70)"

          # --- 4. Timing ---
          # Stagger start time based on layer index
          t_0: 0.199 + (vars.layer * 0.075)
          t_1: vars.t_0 + 0.001
          t_2: vars.t_0 + 0.076

        Initial: 
          frame: dollar
          scale: 1
        
        Keyframes:
          # Your engine parses strings in Keyframes using deepResolve/evaluate,
          # so dynamic Time and Positions work automatically.
          - Time: vars.t_0
            Position: { x: vars.start_x, y: vars.start_y, z: 2080 }
            Alpha: 0
          - Time: vars.t_1
            Alpha: 1
            Position: { x: vars.start_x, y: vars.start_y, z: 2080 }
            Easing:
              Position: cubicInOut
          - Time: vars.t_2
            Alpha: 1
            Position: { x: vars.dest_x, y: vars.dest_y, z: 2080 }
      - IDPrefix: doll_1
        Count: 1536 
        Variables: { x: -1 + ( i % 16) * 0.5, y: 100 + 70 * Math.floor(i / 16), toffset: i/4000 }
        Initial: { frame: dollar, scale: 1, Alpha: 0 }
        Keyframes:
          - Time: 0.84 + vars.toffset
            Alpha: 0
            Position: { x: vars.x, y: vars.y + 70 * 32, z: 2080 }
          - Time: 0.85 + vars.toffset 
            Alpha: 1
            Position: { x: vars.x, y: vars.y + 70 * 32, z: 2080 }
          - Time: 1.25
            Alpha: 1
          - Time: 1.3
            Alpha: 0


    Objects:
      - ID: dollar1
        Initial: { frame: dollar, pos: { x: 0, y: 100, z: 2080 }, scale: 1 }
        Keyframes:
          - Time: 0
            Rotation: -1.56
            Position: { x: -0.5, y: 100, z: 2075 }
            Easing:
               Rotation: quartOut
               Position: quartOut
          - Time: 0.1
            Rotation: 0
            Position: { x: -1, y: 100, z: 2080 }
      - ID: dollar2
        Initial: { frame: dollar, pos: { x: 0, y: 100, z: 2080 }, scale: 1, alpha: 0 }
        Keyframes:
          - Time: 0.099
            Alpha: 0
          - Time: 0.1
            Position: { x: -1, y: 100, z: 2080 }
            Alpha: 1
            Easing:
               Position: cubicInOut
          - Time: 0.2
            Alpha: 1
            Position: { x: -1, y: 170, z: 2080 }
      - ID: iphone1
        Initial: { pos: { x: 2.6, y: 8150, z: 2240 }, scale: 8, frame: iphone16promax7, centerY: true }
        Keyframes:
          - Time: 1.2
            Position: { x: 2.6, y: 8150, z: 2240 }
            Clip: IphoneReveal
          - Time: 1.4
            Position: { x: 2.6, y: 8150, z: 2240 }