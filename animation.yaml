Modifiers:
  ChairFidget_Rotation:
    Type: Sequence
    TargetProperty: rotation
    Playback: Loop
    Interpolation: sineInOut # Changed from sineIn for smoother looping
    # Values: [Forward Lean, Zero, Backward Lean, Zero, Forward Lean]
    Values:  [0.10, 0, 0.10]
    CycleDuration: 1.5 # CRITICAL: Matched to Bob's duration
    Amplitude: 1
  SubtleWalk_Bob:
    Type: Sequence
    TargetProperty: position.y
    Playback: Loop
    Interpolation: sineInOut
    Values: [0, 15, 25, 15, 0, -10, -15, -10] 
    CycleDuration: 0.3 # The duration of a full walk cycle (matches the 6 frames at 0.1s)
    Amplitude: 0.5 # Master scaler for the bob height
  WindSway:
    Type: Sequence
    TargetProperty: rotation
    Playback: Loop
    Interpolation: sineInOut
    Values:  [ 0.0, 0.05, 0.12, 0.18, 0.22, 0.25, 0.23, 0.18, 0.12, 0.05, 0.0, -0.05, -0.10, -0.16, -0.20, -0.22, -0.20, -0.16, -0.10, -0.05, 0.0 ]
    CycleDuration: 2
    Amplitude: 0.1
  Gentle_Breathe:
    Type: Oscillator
    TargetProperty: scale
    Waveform: Sine
    Amplitude: 0.1 # Scale will vary by +/- 2% from its base value
    Frequency: 0.5 # One breath every 2 seconds
  CrowWalk_Bob:
    Type: Sequence
    TargetProperty: position.y
    Playback: Loop
    Interpolation: sineInOut
    Values: [0, 15, 25, 15, 0, -10, -15, -10]
    CycleDuration: 2 # The duration of a full walk cycle (matches the 6 frames at 0.1s)
    Amplitude: 0.25 # Master scaler for the bob height
  PregnantY:
    Type: Sequence
    TargetProperty: position.y
    Playback: Loop
    Interpolation: sineInOut
    Values: [0, 15, 25, 15, 0, -10, -15, -10]
    CycleDuration: 0.5 # The duration of a full walk cycle (matches the 6 frames at 0.1s)
    Amplitude: 0.1 # Master scaler for the bob height
  PregnantRot:
      Type: Sequence
      TargetProperty: rotation
      Playback: Loop
      Interpolation: sineInOut
      Values:  [0.0, 0.05, 0.12, 0.18, 0.22, 0.25, 0.23, 0.18, 0.12, 0.05, 0.0, -0.05, -0.10, -0.16, -0.20, -0.22, -0.20, -0.16, -0.10, -0.05, 0.0]
      CycleDuration: 0.8
      Amplitude: 0.05
  PregnantX:
    Type: Sequence
    TargetProperty: position.x
    Playback: Loop
    Interpolation: sineInOut
    Values: [0, 15, 25, 15, 0, -10, -15, -10]
    CycleDuration: 0.25 # The duration of a full walk cycle (matches the 6 frames at 0.1s)
    Amplitude: 0.0005 # Master scaler for the bob height
  Walk_Bob:
    Type: Sequence
    TargetProperty: position.y
    Playback: Loop
    Interpolation: sineInOut
    Values: [0, 15, 25, 15, 0, -10, -15, -10]
    CycleDuration: 0.15 # The duration of a full walk cycle (matches the 6 frames at 0.1s)
    Amplitude: 1.0 # Master scaler for the bob height
  RunCycle_Bob:
      Type: Sequence
      TargetProperty: position.y
      Playback: Loop
      Interpolation: sin # Changed from sineIn for smoother looping
      # Values: [Highest, Mid, Lowest, Mid, Highest]
      Values: [5, 0, -5, 0, 5]
      CycleDuration: 0.24 # CRITICAL FIX: Must match Rotation's 0.3
      Amplitude: 4.0 # Changed to 1.0. With values [5, 0, -5, 0, 5], Amplitude: 5.0 would result in a 25 unit bob!
  RunCycle_Rotation:
      Type: Sequence
      TargetProperty: rotation
      Playback: Loop
      Interpolation: sin # Changed from sineIn for smoother looping
      # Values: [Forward Lean, Zero, Backward Lean, Zero, Forward Lean]
      Values:  [0.1, 0.0, -0.2, 0.0, 0.1]
      CycleDuration: 0.5 # CRITICAL: Matched to Bob's duration
      Amplitude: 1.0
  Walk_Rotation:
      Type: Sequence
      TargetProperty: rotation
      Playback: Loop
      Interpolation: sin
      Values:  [0.1, 0.0, -0.2, 0.0, 0.1]
      CycleDuration: 1
      Amplitude: 0.8
