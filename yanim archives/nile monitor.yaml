  - EventID: Intro
    Duration: 680
    Normalize: true
    Camera:
      Keyframes:
        0:
          x: 0.25
          y: 400
          z: 1850
          fov: 120
          Easing:
            Position: sineOut
        0.1:
          x: 0.1
          y: 400
          z: 1500
          Easing:
            Position.y: sineOut
        0.15:
          x: 0
          y: 350
          z: 1480
        0.25:
          x: 0
          y: 350
          z: 1400
        0.35:
          x: 0
          y: 300
          z: 1300
        0.5:
          x: -0.6
          y: 100
          z: 1300
        0.55:
          x: -0.9
          y: 0
          z: 1300
        0.59:
          x: -1.4
          y: 0
          z: 1300
          Easing:
            Position: cubicInOut
        0.66:
          x: -1.8
          y: 300
          z: 1250
          Easing:
            Position: sineOut
        0.705:
          x: -1.8
          y: 350
          z: 1300
          Easing:
            Position: step
        0.71:
          x: -2.1
          y: 300
          z: 1400
        0.9:
          x: -2
          y: 300
          z: 1420
    Generators:
      - IDPrefix: shard
        Count: 30 # More shards for a better effect
        Seed: 123
        Variables:
          fsuffix: "i%6 + 1"
          
          # 1. ORIGIN (The Impact Point)
          # Start in a tight, messy cluster around y=600
          angle: "rndRange(0, Math.PI * 2)"
          radius: "rndRange(0, 0.3)" # Small initial spread
          startX: "Math.cos(vars.angle) * vars.radius"
          startY: "600 + Math.sin(vars.angle) * 100" # Oval impact shape
          
          # 2. EXPLOSION VELOCITY (The Scatter)
          # Shards fly outward based on their initial angle (Radial Burst)
          # Multiplier 3-6x means they spread far as they fall
          destX: "vars.startX * rndRange(3, 6) + rndRange(-0.5, 0.5)"
          
          # 3. TIMING
          # impactTime: slight micro-stagger so they don't appear on same frame
          impactTime: "0.04 + rndRange(0, 0.01)" 
          # fallDuration: How long to hit the floor. 
          fallDuration: "rndRange(0.03, 0.05)"
          
          # 4. ROTATION (Violence)
          # Spin 2-5 full circles (4PI to 10PI)
          destRot: "rndRange(4, 10) * Math.PI * (rndRange(0,1)>0.5 ? 1 : -1)"

        Initial: 
          frame: "'shard' + vars.fsuffix"
          # Start exactly at the shatter point
          pos: { x: "vars.startX", y: "vars.startY", z: 1540 } 
          scale: "rndRange(2, 4)" # Random sizes
          alpha: 0 
          BlendMode: screen # Glass is shiny

        Keyframes:
          # 1. Invisible Start
          - Time: 0.0
            Alpha: 0
            Easing: { Alpha: step }

          # 2. THE SHATTER (Appear Instantly)
          - Time: "vars.impactTime"
            Alpha: 1
            Position: { x: "vars.startX", y: "vars.startY", z: 1540 }
            Rotation: 0
            
            Easing: 
              # X: Decelerates (Air resistance)
              Position.x: "quadOut" 
              # Y: Accelerates (Gravity) -> Hits Floor -> Bounces
              Position.y: "bounceOut" 
              # Alpha: Stays visible until the very end
              Alpha: "expoIn"

          # 3. THE FLOOR (Result)
          - Time: "vars.impactTime + vars.fallDuration"
            Alpha: 0
            Position: 
              x: "vars.destX"
              y: 0 # Everything hits the floor
              z: 1540
            Rotation: "vars.destRot"
      - IDPrefix: roach
        Count: 20
        Seed: 500
        Variables:
          startX: "rndRange(-1.25, 0.75)"
          startZ: "rndRange(1200, 1400)"
          # Logic: If starting on left, go left (-200). If right, go right (+200)
          targetX: "vars.startX < 0 ? vars.startX - 2.25 - rndRange(0, 1) : vars.startX + 1 + rndRange(0.5, 1)"
          shouldFlip: "vars.startX < 0"
          clipStart: "rndRange(10, 20) / 100"
        Initial:
          frame: roachattackrear0
          pos: { x: "vars.startX", y: 0, z: "vars.startZ" }
          scale: 5
        Keyframes:
          - Time: "vars.clipStart"
            Clip: CockroachAttack
          - Time: "0.3 + vars.clipStart"
            Clip: CockroachWalkRearSide
            Flip: "vars.shouldFlip"
            Position: { x: "vars.startX", y: 0, z: "vars.startZ" }
          - Time: "0.55 + vars.clipStart"
            Clip: CockroachMoveRear
            Position: { x: "vars.targetX", y: 0, z: "vars.startZ + rndRange(20, 70)" }
      - IDPrefix: Stench
        Count: 15
        Seed: 0
        Variables:
          xOffset: -i * 0.1 - 0.1
          zOffset: rndRange(-100, 100)
          timeOffset: i * 0.01
        Initial: { pos: { x: vars.xOffset, y: -25, z: 1360 + vars.zOffset }, scale: 5, frame: stench_1, alpha: 0.5}
        Keyframes:
          - Time: 0
            Alpha: 0
            Easing:
              Alpha: step
          - Time: 0.38 + vars.timeOffset
            Alpha: 3
          - Time: 0.381 + vars.timeOffset
            Clip: Stench
            Alpha: 2
          - Time: 0.52 + vars.timeOffset
            Alpha: 0
