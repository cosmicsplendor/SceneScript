            Position: cubicInOut
            fov: cubicInOut
        1:
          x: -0.1
          y: 140
          z: 900
          fov: 155
          Easing:
            Position: cubicInOut
            fov: cubicInOut
        1.15:
          x: 0.2
          fov: 150
          y: 90
          z: 900
          Easing:
            Position: cubicInOut
        1.39:
          x: 1.4
          y: 200
          fov: 150
          z: 760
        1.45:
          x: 1.4
          y: 200
          fov: 150
          z: 760
          Easing:
            Position: smootherStep
        1.52:
          x: 0.15
          y: -100
          z: 600
    
    Generators:
      - IDPrefix: bush
        Seed: 100
        Count: 45
        Variables:
          vx: rndRange(1.25, 3)
          z: 600 + i * 50
        Initial:
          pos: { x: vars.vx, y: 0, z: vars.z }
          frame: bush
          scale: 2
      - IDPrefix: pole
        Seed: 1200
        Count: 8
        Variables:
          vx: 1.75
          z: 650.1 + i * 300
        Initial:
          pos: { x: vars.vx, y: 0, z: vars.z }
          frame: pole
          scale: 5
      - IDPrefix: deersign
        Seed: 1200
        Count: 7
        Variables:
          vx: 1.75
          z: 950 + i * 300
        Initial:
          pos: { x: vars.vx, y: 0, z: vars.z }
          frame: deersign
          scale: 3
      - IDPrefix: sideblock
        Seed: 100
        Count: 45
        Variables:
          vx: -1
          z: 600 + i * 50
        Initial:
          pos: { x: vars.vx, y: 0, z: vars.z }
          frame: sideblock
          scale: 1.05
      - IDPrefix: shard
        Count: 20 # More shards for a better effect
        Seed: 23
        Variables:
          fsuffix: "i%6 + 1"
          
          # 1. ORIGIN (The Impact Point)
          # Start in a tight, messy cluster around y=600
          angle: "rndRange(0, Math.PI * 2)"
          radius: "rndRange(0, 0.3)" # Small initial spread
          startX: "Math.cos(vars.angle) * vars.radius - 0.1"
          startY: "200 + Math.sin(vars.angle) * 100" # Oval impact shape
          
          # 2. EXPLOSION VELOCITY (The Scatter)
          # Shards fly outward based on their initial angle (Radial Burst)
          # Multiplier 3-6x means they spread far as they fall
          destX: "vars.startX * rndRange(3, 6) + rndRange(-0.5, 0.5)"
          
          # 3. TIMING
          # impactTime: slight micro-stagger so they don't appear on same frame
          impactTime: "0.625 + rndRange(0, 0.01)" 
          # fallDuration: How long to hit the floor. 
          fallDuration: "rndRange(0.2, 0.3)"
          
          # 4. ROTATION (Violence)
          # Spin 2-5 full circles (4PI to 10PI)
          destRot: "rndRange(4, 10) * Math.PI * (rndRange(0,1)>0.5 ? 1 : -1)"

        Initial: 
          frame: "'shard' + vars.fsuffix"
          # Start exactly at the shatter point
          pos: { x: "vars.startX", y: "vars.startY", z: 730.5 } 
          scale: "rndRange(1.5, 3)" # Random sizes
          alpha: 0 
          BlendMode: screen # Glass is shiny

        Keyframes:
          # 1. Invisible Start
          - Time: 0.0
            Alpha: 0
            Easing: { Alpha: step }

          # 2. THE SHATTER (Appear Instantly)
          - Time: "vars.impactTime"
            Alpha: 1
            Position: { x: "vars.startX", y: "vars.startY", z: 730.5 }
            Rotation: 0
            
            Easing: 
              # X: Decelerates (Air resistance)
              Position.x: "quadOut" 
              # Y: Accelerates (Gravity) -> Hits Floor -> Bounces
              Position.y: "bounceOut" 
              # Alpha: Stays visible until the very end
              Alpha: "expoIn"

          # 3. THE FLOOR (Result)
          - Time: "vars.impactTime + vars.fallDuration"
            Alpha: 0
            Position: 
              x: "vars.destX"
              y: 0 # Everything hits the floor
              z: 749.5
            Rotation: "vars.destRot"
    Objects:
