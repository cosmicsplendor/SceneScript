Clips:
  Bird:
    FrameDuration: 0.05
    Prefix: bird
    Frames: [0, 1, 2, 3, 4, 5]
    Playback: Loop
  InfantinoRun:
    FrameDuration: 0.1
    Prefix: infantino
    Frames: [1, 2, 3]
    Playback: Loop
  RonaldoRun:
    FrameDuration: 0.16
    Prefix: ronaldo
    Frames: [1, 2]
    Playback: Loop
  RedCarTurn:
    FrameDuration: 0.1
    Prefix: red_car
    Frames: [1, 2, 3, 4]
    Playback: Once
Modifiers:
  Walk_Bob:
    Type: Sequence
    TargetProperty: position.y
    Playback: Loop
    Interpolation: sineInOut
    Values: [0, 15, 25, 15, 0, -10, -15, -10] 
    CycleDuration: 0.15 # The duration of a full walk cycle (matches the 6 frames at 0.1s)
    Amplitude: 1.0 # Master scaler for the bob height
  Medium_Walk:
    Type: Sequence
    TargetProperty: position.y
    Playback: Loop
    Interpolation: sineInOut
    Values: [0, 15, 25, 15, 0, -10, -15, -10] 
    CycleDuration: 0.4 # The duration of a full walk cycle (matches the 6 frames at 0.1s)
    Amplitude: 0.8 # Master scaler for the bob height
  Slow_Walk:
    Type: Sequence
    TargetProperty: position.y
    Playback: Loop
    Interpolation: sineInOut
    Values: [0, 10, 20, 10, 0, -5, -10, -5] 
    CycleDuration: 0.8 # The duration of a full walk cycle (matches the 6 frames at 0.1s)
    Amplitude: 0.7 # Master scaler for the bob height
  Macrauchenia:
    Type: Sequence
    TargetProperty: position.y
    Playback: Loop
    Interpolation: step
    Values: [0, 75, 0] 
    CycleDuration: 0.4 # The duration of a full walk cycle (matches the 6 frames at 0.1s)
    Amplitude: 1.0 # Master scaler for the bob height
  Cobweb:
    Type: Sequence
    TargetProperty: scale
    Playback: Loop
    Interpolation: sineInOut
    Values: [1, 1.25, 1.5, 1.25, 1.15, 1.35, 1] 
    CycleDuration: 0.4 # The duration of a full walk cycle (matches the 6 frames at 0.1s)
    Amplitude: 1.0 # Master scaler for the bob height
  Iceman_Walk:
    Type: Sequence
    TargetProperty: rotation
    Playback: Loop
    Interpolation: sineIn
    Values: [0.05, -0.05, -0.15, -0.05, 0.05] 
    CycleDuration: 0.3 # The duration of a full walk cycle (matches the 6 frames at 0.1s)
    Amplitude: 1.0 # Master scaler for the bob height
  Rapid_Breathe:
    Type: Oscillator
    TargetProperty: scale
    Waveform: Sine
    Amplitude: 0.09 # Scale will vary by +/- 2% from its base value
    Frequency: 4 # One breath every 2 seconds
  Gentle_Breathe:
    Type: Oscillator
    TargetProperty: scale
    Waveform: Sine
    Amplitude: 0.075 # Scale will vary by +/- 2% from its base value
    Frequency: 1.5 # One breath every 2 seconds
  VeryGentle_Breathe:
    Type: Oscillator
    TargetProperty: scale
    Waveform: Sine
    Amplitude: 0.015 # Scale will vary by +/- 2% from its base value
    Frequency: 1 # One breath every 2 seconds
  RunCycle_Rotation:
      Type: Sequence
      TargetProperty: rotation
      Playback: Loop
      Interpolation: sin # Changed from sineIn for smoother looping
      Values:  [0.1, 0.0, -0.2, 0.0, 0.1]
      CycleDuration: 0.5 # CRITICAL: Matched to Bob's duration
      Amplitude: 1.0
  Walk_Rotation:
      Type: Sequence
      TargetProperty: rotation
      Playback: Loop
      Interpolation: sin
      Values:  [0.1, 0.0, -0.2, 0.0, 0.1]
      CycleDuration: 1
      Amplitude: 0.8
  Wind_Sway:
      Type: Sequence
      TargetProperty: rotation
      Playback: Loop
      Interpolation: sineInOut
      Values:  [ 0.0, 0.05, 0.12, 0.18, 0.22, 0.25, 0.23, 0.18, 0.12, 0.05, 0.0, -0.05, -0.10, -0.16, -0.20, -0.22, -0.20, -0.16, -0.10, -0.05, 0.0 ]
      CycleDuration: 2
      Amplitude: 1
  ChairFidget_Rotation:
      Type: Sequence
      TargetProperty: rotation
      Playback: Loop
      Interpolation: smoothStep # Changed from sineIn for smoother looping
      # Values: [Forward Lean, Zero, Backward Lean, Zero, Forward Lean]
      Values:  [0.10, 0, -0.05, 0.05, 0.15,  0.10]
      CycleDuration: 2.75 # CRITICAL: Matched to Bob's duration
      Amplitude: 1
  Baboon_Rotation:
      Type: Sequence
      TargetProperty: rotation
      Playback: Loop
      Interpolation: sineInOut # Changed from sineIn for smoother looping
      # Values: [Forward Lean, Zero, Backward Lean, Zero, Forward Lean]
      Values:  [0, -0.1, 0]
      CycleDuration: 0.5 # CRITICAL: Matched to Bob's duration
      Amplitude: 1
  RunCycle_Bob:
      Type: Sequence
      TargetProperty: position.y
      Playback: Loop
      Interpolation: sin # Changed from sineIn for smoother looping
      # Values: [Highest, Mid, Lowest, Mid, Highest]
      Values: [5, 0, -5, 0, 5] 
      CycleDuration: 0.3 # CRITICAL FIX: Must match Rotation's 0.3
      Amplitude: 4.0 # Changed to 1.0. With values [5, 0, -5, 0, 5], Amplitude: 5.0 would result in a 25 unit bob!
XOffset: -1
ZOffset: 500
Sequence:
  - EventID: Intro_Pan
    Duration: 900
    Camera:
      Keyframes:
        0.0:
          x: 9.75
          y: 0
          z: 1125
          Easing:
            Position.y: cubicIn  
        0.2:
          x: 4.5
          y: 50
          z: 970
        0.3:
          x: 3
          y: 50
          z: 800
        0.4:
          x: 1
          y: 50
          z: 500
    Objects:
      # background
      # tree
      # - ID: PFROND1
      #   Initial: { pos: { x: 8, y: 600, z: 3300 }, frame: pfrond, scale: 12 }
      # - ID: PBARK1
      #   Initial: { pos:{ x: 8, y: 0, z: 3300 }, frame: pbark, scale: 12, flip: true }
      - ID: stadium
        Initial: { pos: { x: 7.5, y: 0, z: 2200}, frame: stadium, scale: 40, alpha: 1 }
      - ID: stadium2
        Initial: { pos: { x: 21.5, y: 0, z: 2200}, frame: stadium, scale: 40, alpha: 1, flip: true }
      - ID: football
        Initial: { pos: { x: 10.25, y: 0, z: 1200}, frame: football, scale: 5, alpha: 1 }
        Keyframes:
          - Time: 0
            Position: { x: 10.5, y: 1000, z: 1220}
            Rotation: 0
            Easing:
              Position.y: sineOut
              Rotation: sineOut
          - Time: 0.02
            Position: { x: 9.25, y: 0, z: 1180}
            Rotation: 2
            Easing:
              Position.y: quadOut
          - Time: 0.045
            Position: { x: 7.25, y: 400, z: 1140}
            Rotation: 5
            Easing:
              Position.y: quadIn
          - Time: 0.07
            Position: { x: 5.25, y: 0, z: 1200}
            Rotation: 7
      - ID: goalpost
        Initial: { pos: { x: 10.5, y: 0, z: 1100}, frame: goalpost, scale: 6, alpha: 1.1 }
      - ID: vinicius
        Initial: { pos: { x: 4.25, y: 0, z: 1320}, frame: world_cup, scale: 7, alpha: 1 }
        Keyframes:
          - Time: 0.12
            Alpha: 1
            Easing:
              Alpha: smoothStep
          - Time: 0.15
            Alpha: 1.75
            Easing:
              Alpha: smoothStep
          - Time: 0.20
            Alpha: 1.1
      - ID: car
        Initial: { pos: { x: 1, y: 0, z: 790 }, frame: red_car1, scale: 6, alpha: 1.1 }
        Keyframes:
          - Time: 0.4
            Clip: RedCarTurn
      - ID: infantino
        Initial: { pos: { x: 4, y: 0, z: 950}, frame: infantino1, scale: 2.5, alpha: 1 }
        Keyframes:
          - Time: 0
            Clip: InfantinoRun
            Position: { x: 8.5, y: 0, z: 1100 }
          - Time: 0.38
            Position: { x: 1, y: 0, z: 800 }
            Alpha: 1
          - Time: 0.4
            Position: { x: 1, y: -200, z: 800 }
            Alpha: 0
      - ID: ronaldo1
        Initial: { pos: { x: 7.5, y: 0, z: 1050 }, frame: ronaldo1, scale: 2.5, alpha: 1 }
        Keyframes:
          - Time: 0.0
            Clip: RonaldoRun
            Alpha: 1.2
            Modifiers:
              RunCycle_Bob: { State: Active }
            Position: { x: 10, y: 0, z: 1210 }
          - Time: 0.5
            Position: { x: 1, y: 0, z: 700 }
