      #         Alpha: smoothStep
      #     - Time: 0.29
      #       Alpha: 1
      - ID: priest
        Initial: { pos: { x: 0, y: 0, z: 1200 }, frame: priest, scale: 8 }
      - ID: pyramid1
        Initial: { pos: { x: -14, y: 0, z: 4000 }, frame: pyramid, scale: 60 }
      - ID: pyramid2
        Initial: { pos: { x: -13, y: 0, z: 6000 }, frame: pyramid, scale: 60 }
