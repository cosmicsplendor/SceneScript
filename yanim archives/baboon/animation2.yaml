Clips:
  Harpist:
    FrameDuration: 0.3
    Prefix: harp
    Frames: [3, 4]
    Playback: Loop
  Bird:
    FrameDuration: 0.05
    Prefix: bird
    Frames: [0, 1, 2, 3, 4, 5]
    Playback: Loop
  Gull:
    FrameDuration: 0.075
    Prefix: gull
    Frames: [1, 2]
    Playback: Loop
Modifiers:
  Walk_Bob:
    Type: Sequence
    TargetProperty: position.y
    Playback: Loop
    Interpolation: sineInOut
    Values: [0, 15, 25, 15, 0, -10, -15, -10] 
    CycleDuration: 0.2 # The duration of a full walk cycle (matches the 6 frames at 0.1s)
    Amplitude: 1.0 # Master scaler for the bob height
  Medium_Walk:
    Type: Sequence
    TargetProperty: position.y
    Playback: Loop
    Interpolation: sineInOut
    Values: [0, 15, 25, 15, 0, -10, -15, -10] 
    CycleDuration: 0.4 # The duration of a full walk cycle (matches the 6 frames at 0.1s)
    Amplitude: 0.8 # Master scaler for the bob height
  Slow_Walk:
    Type: Sequence
    TargetProperty: position.y
    Playback: Loop
    Interpolation: sineInOut
    Values: [0, 10, 20, 10, 0, -5, -10, -5] 
    CycleDuration: 0.8 # The duration of a full walk cycle (matches the 6 frames at 0.1s)
    Amplitude: 0.7 # Master scaler for the bob height
  Macrauchenia:
    Type: Sequence
    TargetProperty: position.y
    Playback: Loop
    Interpolation: step
    Values: [0, 75, 0] 
    CycleDuration: 0.4 # The duration of a full walk cycle (matches the 6 frames at 0.1s)
    Amplitude: 1.0 # Master scaler for the bob height
  Cobweb:
    Type: Sequence
    TargetProperty: scale
    Playback: Loop
    Interpolation: sineInOut
    Values: [1, 1.25, 1.5, 1.25, 1.15, 1.35, 1] 
    CycleDuration: 0.4 # The duration of a full walk cycle (matches the 6 frames at 0.1s)
    Amplitude: 1.0 # Master scaler for the bob height
  Iceman_Walk:
    Type: Sequence
    TargetProperty: rotation
    Playback: Loop
    Interpolation: sineIn
    Values: [0.05, -0.05, -0.15, -0.05, 0.05] 
    CycleDuration: 0.3 # The duration of a full walk cycle (matches the 6 frames at 0.1s)
    Amplitude: 1.0 # Master scaler for the bob height
  Rapid_Breathe:
    Type: Oscillator
    TargetProperty: scale
    Waveform: Sine
    Amplitude: 0.09 # Scale will vary by +/- 2% from its base value
    Frequency: 4 # One breath every 2 seconds
  Gentle_Breathe:
    Type: Oscillator
    TargetProperty: scale
    Waveform: Sine
    Amplitude: 0.075 # Scale will vary by +/- 2% from its base value
    Frequency: 1.5 # One breath every 2 seconds
  VeryGentle_Breathe:
    Type: Oscillator
    TargetProperty: scale
    Waveform: Sine
    Amplitude: 0.03 # Scale will vary by +/- 2% from its base value
    Frequency: 1 # One breath every 2 seconds
  RunCycle_Rotation:
      Type: Sequence
      TargetProperty: rotation
      Playback: Loop
      Interpolation: sin # Changed from sineIn for smoother looping
      Values:  [0.1, 0.0, -0.2, 0.0, 0.1]
      CycleDuration: 0.5 # CRITICAL: Matched to Bob's duration
      Amplitude: 1.0
  Wipe:
      Type: Sequence
      TargetProperty: rotation
      Playback: Loop
      Interpolation: sin
      Values:  [-0.1, 0.0, -0.1, 0.0, -0.1]
      CycleDuration: 2
      Amplitude: 4.8
  Walk_Rotation:
      Type: Sequence
      TargetProperty: rotation
      Playback: Loop
      Interpolation: sin
      Values:  [-0.1, 0.0, -0.1, 0.0, -0.1]
      CycleDuration: 0.75
      Amplitude: 0.8
  ChairFidget_Rotation:
      Type: Sequence
      TargetProperty: rotation
      Playback: Loop
      Interpolation: sineInOut # Changed from sineIn for smoother looping
      # Values: [Forward Lean, Zero, Backward Lean, Zero, Forward Lean]
      Values:  [0.10, 0, 0.10]
      CycleDuration: 1.5 # CRITICAL: Matched to Bob's duration
      Amplitude: 1
  Baboon_Rotation:
      Type: Sequence
      TargetProperty: rotation
      Playback: Loop
      Interpolation: sineInOut # Changed from sineIn for smoother looping
      # Values: [Forward Lean, Zero, Backward Lean, Zero, Forward Lean]
      Values:  [0, -0.1, 0]
      CycleDuration: 0.5 # CRITICAL: Matched to Bob's duration
      Amplitude: 1
  Chariot_Bob:
      Type: Sequence
      TargetProperty: position.y
      Playback: Loop
      Interpolation: sin # Changed from sineIn for smoother looping
      # Values: [Highest, Mid, Lowest, Mid, Highest]
      Values: [5, 0, -5, 0, 5] 
      CycleDuration: 0.25 # CRITICAL FIX: Must match Rotation's 0.3
      Amplitude: 1.0 # Changed to 1.0. With values [5, 0, -5, 0, 5], Amplitude: 5.0 would result in a 25 unit bob!
  RunCycle_Bob:
      Type: Sequence
      TargetProperty: position.y
      Playback: Loop
      Interpolation: sin # Changed from sineIn for smoother looping
      # Values: [Highest, Mid, Lowest, Mid, Highest]
      Values: [5, 0, -5, 0, 5] 
      CycleDuration: 0.25 # CRITICAL FIX: Must match Rotation's 0.3
      Amplitude: 4.0 # Changed to 1.0. With values [5, 0, -5, 0, 5], Amplitude: 5.0 would result in a 25 unit bob!
